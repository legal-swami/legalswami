name: 🚨 EMERGENCY DEBUG - API Key Issue

on:
  workflow_dispatch:  # Manual trigger

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 🔐 SECRET DEBUG - What's REALLY in secrets?
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== CRITICAL DEBUG ==="
          echo "Date: $(date)"
          echo "Repository: $GITHUB_REPOSITORY"
          echo ""
          
          # 1. Check if secret EXISTS
          echo "1. Checking GROQ_API_KEY secret..."
          if [ -z "${GROQ_API_KEY+x}" ]; then
            echo "❌❌❌ GROQ_API_KEY variable is NOT SET AT ALL!"
            echo "This means the secret doesn't exist in repository."
            echo ""
            echo "IMMEDIATE ACTION REQUIRED:"
            echo "1. Go to: https://github.com/$GITHUB_REPOSITORY/settings/secrets/actions"
            echo "2. Click 'New repository secret'"
            echo "3. Name: GROQ_API_KEY"
            echo "4. Value: Your Groq API key (from console.groq.com)"
            echo "5. Click 'Add secret'"
            exit 1
          fi
          
          # 2. Check if secret is EMPTY
          echo "2. Checking if secret has value..."
          if [ -z "$GROQ_API_KEY" ]; then
            echo "❌❌❌ GROQ_API_KEY is SET but EMPTY!"
            echo "The secret exists but has no value."
            echo ""
            echo "ACTION: Update the GROQ_API_KEY secret with actual key."
            exit 1
          fi
          
          # 3. Show key details (safely)
          echo "✅ GROQ_API_KEY secret EXISTS and has value!"
          echo ""
          echo "3. Key Details (safe view):"
          echo "   Length: ${#GROQ_API_KEY} characters"
          echo "   Starts with: ${GROQ_API_KEY:0:4}"
          echo "   First 10 chars: ${GROQ_API_KEY:0:10}"
          echo "   Last 10 chars: ${GROQ_API_KEY: -10}"
          
          # 4. Check format
          echo ""
          echo "4. Format Check:"
          if [[ "$GROQ_API_KEY" == gsk_* ]]; then
            echo "   ✅ Starts with 'gsk_' (correct for Groq)"
          else
            echo "   ⚠️  Doesn't start with 'gsk_' - unusual"
            echo "   Actual start: '${GROQ_API_KEY:0:4}'"
          fi
          
          # 5. Check for common issues
          echo ""
          echo "5. Common Issue Check:"
          if [[ "$GROQ_API_KEY" == *$'\n'* ]]; then
            echo "   ❌ Contains NEWLINE character"
            echo "   Fix: Remove line breaks when copying key"
          fi
          if [[ "$GROQ_API_KEY" == *" "* ]]; then
            echo "   ❌ Contains SPACES"
            echo "   Fix: Remove spaces from key"
          fi
          if [ ${#GROQ_API_KEY} -lt 30 ]; then
            echo "   ⚠️  Very short (${#GROQ_API_KEY} chars) - might be incomplete"
          fi
          if [ ${#GROQ_API_KEY} -gt 100 ]; then
            echo "   ⚠️  Very long (${#GROQ_API_KEY} chars) - might have extra text"
          fi
          
          # 6. Create a test to verify
          echo ""
          echo "6. Creating TEST files..."
          
          # Test file with injected key
          cat > test-injection.html << EOF
          <!DOCTYPE html>
          <html>
          <head><title>API Key Test</title></head>
          <body>
          <h1>API Key Injection Test</h1>
          <div id="debug">
          <p>Key exists: YES</p>
          <p>Key length: ${#GROQ_API_KEY} chars</p>
          <p>Key starts with: ${GROQ_API_KEY:0:10}</p>
          <p>Is placeholder? NO</p>
          <script>
          // Test JavaScript injection
          const TEST_KEY = "${GROQ_API_KEY}";
          console.log("Test Key in JS:", TEST_KEY.substring(0, 15) + "...");
          </script>
          </div>
          </body>
          </html>
          EOF
          
          echo "✅ Created test-injection.html"
          
          # Also test the actual injection
          echo ""
          echo "7. Testing ACTUAL injection on index4.html..."
          if [ -f "index4.html" ]; then
            # Create backup
            cp index4.html index4.html.backup
            
            # Try injection
            sed -i 's/const GROQ_API_KEY = \["__GROQ_API_KEY_PLACEHOLDER__"\];/const GROQ_API_KEY = ["'"${GROQ_API_KEY}"'"];/g' index4.html
            
            # Check result
            if grep -q "\"$GROQ_API_KEY\"" index4.html; then
              echo "   ✅ SUCCESS: Key injected into index4.html!"
              echo "   Line after injection:"
              grep "GROQ_API_KEY" index4.html
            else
              echo "   ❌ FAILED: Key not found after injection"
              echo "   Current line:"
              grep "GROQ_API_KEY" index4.html
            fi
            
            # Restore backup
            mv index4.html.backup index4.html
          else
            echo "   ⚠️  index4.html not found"
          fi
      
      - name: 📤 Upload Debug Results
        uses: actions/upload-artifact@v4
        with:
          name: debug-results
          path: |
            test-injection.html
          retention-days: 1
