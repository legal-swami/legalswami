name: Deploy Static HTML

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 🔍 FIND EXACT PATTERN
        run: |
          echo "=== FINDING EXACT PATTERN ==="
          # Method 1: Show exact line with special characters
          echo "Exact line with cat -A:"
          grep "GROQ_API_KEY" index4.html | cat -A
          
          echo ""
          echo "=== HEX DUMP OF LINE ==="
          grep "GROQ_API_KEY" index4.html | xxd
          
          echo ""
          echo "=== EXACT REPLACEMENT NEEDED ==="
          # Show what we need to replace
          LINE=$(grep "GROQ_API_KEY.*PLACEHOLDER" index4.html)
          echo "Line to replace: '$LINE'"
      
      - name: 🛠️ PERFECT INJECTION
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "=== PERFECT INJECTION ==="
          
          # READ the exact line
          EXACT_LINE=$(grep 'GROQ_API_KEY.*__GROQ_API_KEY_PLACEHOLDER__' index4.html)
          echo "Found line: '$EXACT_LINE'"
          
          # CREATE the replacement line
          REPLACEMENT_LINE="const GROQ_API_KEY = [\"${GROQ_API_KEY}\"];"
          echo "Replacement: '$REPLACEMENT_LINE'"
          
          # USE awk for exact line replacement (more reliable than sed)
          awk -v replace="$REPLACEMENT_LINE" \
              '/GROQ_API_KEY.*__GROQ_API_KEY_PLACEHOLDER__/ {print replace; next} {print}' \
              index4.html > index4.html.tmp && mv index4.html.tmp index4.html
          
          echo "✅ awk replacement completed"
          
          # VERIFY
          echo ""
          echo "=== VERIFICATION ==="
          if grep -q "\"$GROQ_API_KEY\"" index4.html; then
            echo "✅ SUCCESS: Exact key found"
            echo "First 20 chars: ${GROQ_API_KEY:0:20}"
          else
            echo "❌ FAILED: Key not found"
            echo "Trying emergency method..."
            
            # EMERGENCY: Delete and recreate file
            LINES_BEFORE=$(wc -l < index4.html)
            grep -v "GROQ_API_KEY.*__GROQ_API_KEY_PLACEHOLDER__" index4.html > index4.html.tmp
            echo "const GROQ_API_KEY = [\"${GROQ_API_KEY}\"];" >> index4.html.tmp
            mv index4.html.tmp index4.html
            echo "Emergency fix applied"
          fi
      
      - name: Create index.html
        run: cp index4.html index.html
      
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: ./
      - uses: actions/deploy-pages@v4
