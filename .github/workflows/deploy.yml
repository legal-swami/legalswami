name: Deploy Static HTML

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        
      - name: 🔧 Inject API Key (Node.js Method)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          node -e "
          const fs = require('fs');
          let content = fs.readFileSync('index4.html', 'utf8');
          
          // Replace the placeholder using the exact format from your file
          const updatedContent = content.replace('const GROQ_API_KEY = [\"__GROQ_API_KEY_PLACEHOLDER__\"];', 'const GROQ_API_KEY = [\"' + process.env.GROQ_API_KEY + '\"];');
          
          fs.writeFileSync('index4.html', updatedContent);
          console.log('✅ API Key placeholder replaced.');
          
          // Quick verification
          if (content.includes(process.env.GROQ_API_KEY)) {
            console.log('✅ Verification: Real key found in file.');
          } else {
            console.log('⚠️  Post-replacement check: Key not found in file string.');
          }
          "
      
      - name: 📄 Create index.html
        run: cp index4.html index.html
      
      - name: ⚙️ Setup GitHub Pages
        uses: actions/configure-pages@v5
      
      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./
      
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
