name: Deploy with Guaranteed Injection

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 🔐 GUARANTEED API Key Injection
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "=== STARTING GUARANTEED INJECTION ==="
          
          # Method 1: Use Python for perfect replacement
          python3 -c "
          import re
          
          with open('index4.html', 'r') as f:
              content = f.read()
          
          key = '$GROQ_API_KEY'
          
          # Try multiple patterns
          patterns = [
              r'const GROQ_API_KEY = \\[\\"__GROQ_API_KEY_PLACEHOLDER__\\"\\];',
              r'const GROQ_API_KEY = \\[\\'__GROQ_API_KEY_PLACEHOLDER__\\'\\];',
              r'const GROQ_API_KEY = \\[\\"__GROQ_API_KEY_PLACEHOLDER__\\"\\]',
              r'GROQ_API_KEY = \\[\\"__GROQ_API_KEY_PLACEHOLDER__\\"\\]',
              r'\\[\\"__GROQ_API_KEY_PLACEHOLDER__\\"\\]'
          ]
          
          for pattern in patterns:
              if re.search(pattern, content):
                  print(f'Found pattern: {pattern}')
                  new_content = re.sub(pattern, f'const GROQ_API_KEY = [\\"{key}\\\"];', content)
                  with open('index4.html', 'w') as f:
                      f.write(new_content)
                  print('✅ Replacement successful with Python')
                  break
          else:
              print('❌ No pattern matched. Using brute force...')
              # Brute force: Replace all occurrences
              new_content = content.replace('__GROQ_API_KEY_PLACEHOLDER__', key)
              with open('index4.html', 'w') as f:
                  f.write(new_content)
              print('✅ Brute force replacement done')
          
          # Verify
          with open('index4.html', 'r') as f:
              new_content = f.read()
          
          if key in new_content:
              print('✅ VERIFIED: Key is in file')
          else:
              print('❌ VERIFICATION FAILED: Key not found')
              exit(1)
          "
          
          echo "=== INJECTION COMPLETE ==="
      
      - run: cp index4.html index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: ./
      - uses: actions/deploy-pages@v4
