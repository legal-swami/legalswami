name: Deploy Static HTML

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔍 Debug HTML file
        run: |
          echo "Checking index4.html..."
          if [ -f "index4.html" ]; then
            echo "✅ File exists"
            echo "Lines with GROQ_API_KEY:"
            grep -n "GROQ_API_KEY" index4.html || echo "Not found"
          else
            echo "❌ File not found!"
            exit 1
          fi
      
      - name: 🛠️ SIMPLE API Key Injection
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "Starting injection..."
          echo "Key available: $([ -n "$GROQ_API_KEY" ] && echo 'YES' || echo 'NO')"
          
          # BACKUP first
          cp index4.html index4.html.backup
          
          # TRY 1: Exact pattern from your HTML
          echo "Trying exact pattern replacement..."
          sed -i 's/const GROQ_API_KEY = \["__GROQ_API_KEY_PLACEHOLDER__"\];/const GROQ_API_KEY = ["'"$GROQ_API_KEY"'"];/g' index4.html
          
          # CHECK if worked
          if grep -q "gsk_" index4.html; then
            echo "✅ SUCCESS: gsk_ found!"
          else
            echo "❌ Pattern 1 failed, trying pattern 2..."
            # Restore backup and try different pattern
            cp index4.html.backup index4.html
            sed -i 's/"__GROQ_API_KEY_PLACEHOLDER__"/"'"$GROQ_API_KEY"'"/g' index4.html
          fi
          
          # FINAL CHECK
          echo ""
          echo "=== FINAL RESULT ==="
          if grep -q "__GROQ_API_KEY_PLACEHOLDER__" index4.html; then
            echo "❌ FAILURE: Placeholder still exists"
            echo "Current line:"
            grep "GROQ_API_KEY" index4.html
          else
            echo "✅ SUCCESS: Placeholder replaced"
            echo "gsk_ found: $(grep -q "gsk_" index4.html && echo YES || echo NO)"
          fi
          
          # Cleanup
          rm -f index4.html.backup
      
      - name: 📄 Create index.html
        run: cp index4.html index.html
      
      - name: ⚙️ Setup GitHub Pages
        uses: actions/configure-pages@v5
      
      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./
      
      - name: 🚀 Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
