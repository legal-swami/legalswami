name: Deploy Static HTML

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    
    steps:
      # Step 1: Checkout
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Step 2: SIMPLE API Key Injection
      - name: Inject API Key
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "🔧 Starting API key injection..."
          echo "Key available: $([ -n "$GROQ_API_KEY" ] && echo 'YES' || echo 'NO')"
          
          # FIRST, check what's in the file
          echo "📄 Checking index4.html..."
          grep -n "GROQ_API_KEY" index4.html || echo "GROQ_API_KEY not found in file"
          
          # SIMPLE replacement - no complex patterns
          # This will replace ALL occurrences of the placeholder
          sed -i "s|__GROQ_API_KEY_PLACEHOLDER__|${GROQ_API_KEY}|g" index4.html
          
          # Verify
          echo "✅ Replacement done"
          echo "Checking if placeholder still exists..."
          if grep -q "__GROQ_API_KEY_PLACEHOLDER__" index4.html; then
            echo "❌ ERROR: Placeholder still found!"
            echo "Trying different pattern..."
            # Maybe there are quotes around placeholder
            sed -i "s|'__GROQ_API_KEY_PLACEHOLDER__'|'${GROQ_API_KEY}'|g" index4.html
            sed -i 's|"__GROQ_API_KEY_PLACEHOLDER__"|"'"${GROQ_API_KEY}"'"|g' index4.html
          fi
          
          # Final check
          if grep -q "gsk_" index4.html; then
            echo "🎉 SUCCESS: gsk_ found in file!"
          else
            echo "⚠️  gsk_ NOT found - but let's continue deployment"
          fi
      
      # Step 3: Create index.html
      - name: Create index.html for GitHub Pages
        run: |
          cp index4.html index.html
          echo "Created index.html"
      
      # Step 4: Setup and Deploy
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./
      
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
