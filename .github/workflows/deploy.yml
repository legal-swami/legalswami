name: Deploy with Array API Key Fix

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Debug - Show Current HTML
        run: |
          echo "=== Current GROQ_API_KEY line in index4.html ==="
          grep -n "GROQ_API_KEY" index4.html
          echo ""
          echo "=== Exact content ==="
          grep "GROQ_API_KEY" index4.html | head -2
      
      - name: Fix and Inject API Key
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "=== API KEY INJECTION ==="
          echo "Key from secrets (first 10 chars): ${GROQ_API_KEY:0:10}..."
          
          # Method 1: Direct array replacement
          echo "Method 1: Replacing in array format..."
          if grep -q '\["__GROQ_API_KEY_PLACEHOLDER__"\]' index4.html; then
            echo "Found array pattern with double quotes"
            sed -i 's|\["__GROQ_API_KEY_PLACEHOLDER__"\]|["'"${GROQ_API_KEY}"'"]|g' index4.html
          elif grep -q "\\['__GROQ_API_KEY_PLACEHOLDER__'\\]" index4.html; then
            echo "Found array pattern with single quotes"
            sed -i "s|\\['__GROQ_API_KEY_PLACEHOLDER__'\\]|\\['${GROQ_API_KEY}'\\]|g" index4.html
          elif grep -q '=\s*\[.*__GROQ_API_KEY_PLACEHOLDER__.*\]' index4.html; then
            echo "Found generic array pattern"
            # Use Perl for complex replacement
            perl -i -pe 's/(=\s*\[)[^\]]*__GROQ_API_KEY_PLACEHOLDER__[^\]]*(\])/$1"'"${GROQ_API_KEY}"'"$2/g' index4.html
          else
            echo "❌ No array pattern found"
          fi
          
          # Verify
          echo ""
          echo "=== VERIFICATION ==="
          if grep -q "\"${GROQ_API_KEY}\"" index4.html || grep -q "'${GROQ_API_KEY}'" index4.html; then
            echo "✅ SUCCESS: Key injected!"
            echo "Updated line:"
            grep "GROQ_API_KEY" index4.html
          else
            echo "❌ FAILED: Key not found after injection"
            echo "Trying emergency fix..."
            
            # Emergency: Convert array to string
            sed -i 's/const GROQ_API_KEY = \["__GROQ_API_KEY_PLACEHOLDER__"\];/const GROQ_API_KEY = "'"${GROQ_API_KEY}"'";/g' index4.html
            
            if grep -q "${GROQ_API_KEY}" index4.html; then
              echo "✅ Emergency fix worked (converted to string)"
            else
              echo "❌ All methods failed"
              exit 1
            fi
          fi
      
      - name: Create index.html
        run: cp index4.html index.html
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./
      
      - name: Deploy
        uses: actions/deploy-pages@v4
