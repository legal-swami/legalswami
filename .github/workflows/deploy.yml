name: Deploy Static HTML

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      # 1. Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      # 2. Verify files exist
      - name: Check HTML Files
        run: |
          echo "📁 Files in repository:"
          ls -la *.html || echo "No HTML files found"
          echo ""
          
          if [ -f "index4.html" ]; then
            echo "✅ Found index4.html"
            echo "File size: $(wc -l < index4.html) lines"
          else
            echo "❌ ERROR: index4.html not found!"
            echo "Available HTML files:"
            find . -name "*.html" -type f | head -10
            exit 1
          fi
      
      # 3. Inject API Key into index4.html
      - name: Inject API Key
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "🔑 Injecting API key into index4.html..."
          
          # Check if API key exists
          if [ -z "$GROQ_API_KEY" ]; then
            echo "❌ Error: GROQ_API_KEY secret is not set"
            echo "Please add GROQ_API_KEY to repository secrets"
            exit 1
          fi
          
          # Backup original file
          cp index4.html index4.html.backup
          
          # Inject API key
          sed -i "s|__GROQ_API_KEY_PLACEHOLDER__|$GROQ_API_KEY|g" index4.html
          echo "✅ API key injected into index4.html"
          
          # Verify injection worked
          if grep -q "$GROQ_API_KEY" index4.html; then
            echo "✅ Verification: API key found in index4.html"
            echo "First 50 chars of key: ${GROQ_API_KEY:0:50}..."
          else
            echo "⚠️ Warning: API key might not have been injected"
            echo "Checking for placeholder..."
            if grep -q "__GROQ_API_KEY_PLACEHOLDER__" index4.html; then
              echo "❌ Placeholder still exists! Injection failed"
              # Restore backup
              mv index4.html.backup index4.html
              exit 1
            else
              echo "✅ Placeholder replaced (key might be truncated)"
            fi
          fi
          
          # Clean up backup
          rm index4.html.backup
      
      # 4. Rename index4.html to index.html for GitHub Pages
      - name: Rename for GitHub Pages
        run: |
          echo "🔄 Renaming index4.html to index.html..."
          cp index4.html index.html
          echo "✅ Created index.html from index4.html"
          echo "Files now:"
          ls -la *.html
      
      # 5. Configure GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      # 6. Upload to Pages artifact
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./  # All files in current directory
      
      # 7. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
