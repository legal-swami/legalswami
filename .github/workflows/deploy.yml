- name: Inject API Key (Alternative Method)
  env:
    GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  run: |
    echo "Using alternative injection method..."
    
    # 1. First, check current content
    echo "=== BEFORE ==="
    grep -n "GROQ_API_KEY" index4.html | head -3
    
    # 2. Use a different placeholder format
    # Replace ANY array containing placeholder
    sed -i 's/\["__GROQ_API_KEY_PLACEHOLDER__"\]/["'"${GROQ_API_KEY}"'"]/g' index4.html
    sed -i "s/\\['__GROQ_API_KEY_PLACEHOLDER__'\\]/\\['${GROQ_API_KEY}'\\]/g" index4.html
    
    # 3. Also try converting array to string (safer)
    sed -i 's/const GROQ_API_KEY = \["__GROQ_API_KEY_PLACEHOLDER__"\];/const GROQ_API_KEY = "'"${GROQ_API_KEY}"'";/g' index4.html
    
    # 4. VERIFY with a different method
    echo ""
    echo "=== VERIFICATION ==="
    
    # Create a checksum to verify without showing key
    CHECKSUM=$(echo -n "$GROQ_API_KEY" | md5sum | cut -d' ' -f1)
    echo "Key MD5 checksum: $CHECKSUM"
    
    # Check if placeholder is gone
    if grep -q "__GROQ_API_KEY_PLACEHOLDER__" index4.html; then
      echo "❌ ERROR: Placeholder still exists!"
      echo "Trying emergency fix..."
      
      # Emergency: Manual replacement
      python3 -c "
import re
with open('index4.html', 'r') as f:
    content = f.read()
    
# Find and replace ALL occurrences
new_content = re.sub(r'\[\s*[\"\\']__GROQ_API_KEY_PLACEHOLDER__[\"\\']\s*\]', '[\"' + '$GROQ_API_KEY' + '\"]', content)
new_content = re.sub(r'const GROQ_API_KEY\s*=\s*\[[^]]*__GROQ_API_KEY_PLACEHOLDER__[^]]*\]', 'const GROQ_API_KEY = [\"' + '$GROQ_API_KEY' + '\"]', new_content)

with open('index4.html', 'w') as f:
    f.write(new_content)
print('Python replacement done')
"
    else
      echo "✅ SUCCESS: Placeholder replaced"
    fi
    
    # 5. Final check
    echo ""
    echo "=== FINAL CHECK ==="
    echo "Number of placeholders remaining:"
    grep -o "__GROQ_API_KEY_PLACEHOLDER__" index4.html | wc -l
    
    echo "Checking for actual key (obfuscated):"
    if grep -q "gsk_" index4.html; then
      echo "✅ gsk_ found in file (key is present)"
      # Show context without revealing full key
      grep -o 'gsk_[^"]*' index4.html | head -c 20
      echo "..."
    else
      echo "❌ gsk_ NOT found - injection failed"
    fi
