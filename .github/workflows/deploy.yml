name: Debug API Key Injection

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 🔍 DEBUG - Show Key Status (Safe)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "=== DEBUG INFORMATION ==="
          echo "Key exists in secrets: $([ -n \"$GROQ_API_KEY\" ] && echo '✅ YES' || echo '❌ NO')"
          echo "Key length: ${#GROQ_API_KEY} characters"
          echo "Key starts with: ${GROQ_API_KEY:0:10}..."
          echo "Key ends with: ...${GROQ_API_KEY: -10}"
          echo ""
          
          # Check index4.html
          if [ -f "index4.html" ]; then
            echo "=== Checking index4.html ==="
            echo "File exists: ✅"
            echo "Placeholder found: $(grep -q '__GROQ_API_KEY_PLACEHOLDER__' index4.html && echo '✅ YES' || echo '❌ NO')"
            
            # Show lines around placeholder
            echo "Placeholder context:"
            grep -n -B2 -A2 '__GROQ_API_KEY_PLACEHOLDER__' index4.html || echo "No placeholder found"
          else
            echo "❌ index4.html not found!"
            exit 1
          fi
      
      - name: Inject API Key with Verification
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "=== INJECTION PROCESS ==="
          
          # Create test files to verify injection
          cp index4.html index4.original.html
          
          # Perform injection
          sed -i "s|__GROQ_API_KEY_PLACEHOLDER__|${GROQ_API_KEY}|g" index4.html
          
          echo "✅ Injection attempted"
          
          # Verify injection
          echo "=== VERIFICATION ==="
          echo "Placeholder still present: $(grep -q '__GROQ_API_KEY_PLACEHOLDER__' index4.html && echo '❌ YES (FAILED)' || echo '✅ NO (SUCCESS)')"
          
          # Check what was actually inserted
          echo "Checking inserted content..."
          
          # Extract the line with the key
          KEY_LINE=$(grep -o '".*"' index4.html | grep -v '""' | head -5)
          echo "Sample lines with quotes:"
          echo "$KEY_LINE"
          
          # Create a simple test file to show the injection
          echo "<html><body><h1>Key Test</h1>
          <div id='key-display' style='background:#f0f0f0;padding:10px;margin:10px;'>
          Injected Key (first/last 10 chars): ${GROQ_API_KEY:0:10}...${GROQ_API_KEY: -10}
          </div></body></html>" > key-test.html
          
          echo "Created key-test.html for manual verification"
      
      - name: Create index.html
        run: cp index4.html index.html
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./
      
      - name: Deploy
        uses: actions/deploy-pages@v4
