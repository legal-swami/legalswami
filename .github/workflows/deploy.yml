name: Deploy Static HTML

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      # 1. Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      # 2. Inject API Key Securely
      - name: Inject API Key
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "🔑 Injecting API key into HTML files..."
          
          # Check if API key exists
          if [ -z "$GROQ_API_KEY" ]; then
            echo "❌ Error: GROQ_API_KEY secret is not set"
            echo "Please add GROQ_API_KEY to your repository secrets"
            exit 1
          fi
          
          # Inject into index.html
          if [ -f "index.html" ]; then
            sed -i "s|__GROQ_API_KEY_PLACEHOLDER__|$GROQ_API_KEY|g" index.html
            echo "✅ API key injected into index.html"
            
            # Verify injection
            if grep -q "$GROQ_API_KEY" index.html; then
              echo "✅ Verification: API key found in index.html"
            else
              echo "⚠️ Warning: API key might not have been injected properly"
            fi
          else
            echo "❌ Error: index.html not found!"
            exit 1
          fi
          
          # Inject into other HTML files
          echo "📄 Checking for other HTML files..."
          count=0
          for file in *.html; do
            if [ -f "$file" ] && [ "$file" != "index.html" ]; then
              if grep -q "__GROQ_API_KEY_PLACEHOLDER__" "$file"; then
                sed -i "s|__GROQ_API_KEY_PLACEHOLDER__|$GROQ_API_KEY|g" "$file"
                echo "✅ API key injected into $file"
                ((count++))
              fi
            fi
          done
          
          if [ $count -gt 0 ]; then
            echo "✅ API keys injected into $count additional HTML files"
          fi
      
      # 3. Configure GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      # 4. Upload to Pages artifact (UPDATED from v3 to v4)
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./  # Static HTML files in current directory
      
      # 5. Deploy to GitHub Pages (UPDATED from v2 to v4)
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
