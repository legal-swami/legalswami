name: Secure Deploy
on:
  push:
    branches: [ main, master ]  # Specify which branches trigger deployment

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Moved to job level
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Verify HTML file exists
      run: |
        if [ ! -f "index4.html" ]; then
          echo "Error: index4.html not found!"
          ls -la
          exit 1
        fi
    
    - name: Inject API Key Securely
      run: |
        # Use a different delimiter and escape special characters
        GROQ_API_KEY_ESCAPED=$(echo "${{ secrets.GROQ_API_KEY }}" | sed 's/[&/\]/\\&/g')
        sed -i.bak "s|__GROQ_API_KEY_PLACEHOLDER__|${GROQ_API_KEY_ESCAPED}|g" index4.html
        
        # Optional: Verify the replacement worked
        if grep -q "__GROQ_API_KEY_PLACEHOLDER__" index4.html; then
          echo "Warning: Placeholder still found in file"
        fi
        
        # Remove backup file
        rm -f index4.html.bak
      
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: .
        publish_branch: gh-pages  # Explicitly specify the target branch
        keep_files: false  # Clean the branch before deploying
