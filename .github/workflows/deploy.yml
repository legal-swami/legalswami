name: Simple Deploy
on:
  push:
    branches: [ main, master ]

permissions:
  contents: write
  pages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Create basic site if missing
        run: |
          # If no index.html exists, create one
          if [ ! -f "index.html" ]; then
            echo '<!DOCTYPE html>
            <html>
            <head>
              <title>My Site</title>
              <script>
                const API_KEY = "${{ secrets.GROQ_API_KEY || 'DEMO_KEY' }}";
                console.log("API Key configured");
              </script>
            </head>
            <body>
              <h1>Site Deployed Successfully!</h1>
              <p>Deployed via GitHub Actions</p>
            </body>
            </html>' > index.html
          fi
      
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          force_orphan: true  # Clean deployment
