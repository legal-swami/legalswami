name: Deploy Static HTML

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    
    steps:
      # Step 1: Checkout
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Step 2: SIMPLE & RELIABLE Injection
      - name: Inject API Key (Simple Method)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "Starting injection..."
          
          # Backup file
          cp index4.html index4.html.bak
          
          # METHOD 1: Exact pattern replacement
          sed -i 's/const GROQ_API_KEY = \["__GROQ_API_KEY_PLACEHOLDER__"\];/const GROQ_API_KEY = ["'"$GROQ_API_KEY"'"];/g' index4.html
          
          # Check if worked
          if grep -q "gsk_" index4.html; then
            echo "✅ Success: Key injected (Method 1)"
          else
            echo "Method 1 failed, trying Method 2..."
            
            # Restore backup
            cp index4.html.bak index4.html
            
            # METHOD 2: Simple string replacement
            sed -i 's/__GROQ_API_KEY_PLACEHOLDER__/'"$GROQ_API_KEY"'/g' index4.html
            
            if grep -q "gsk_" index4.html; then
              echo "✅ Success: Key injected (Method 2)"
            else
              echo "❌ Both methods failed"
              
              # METHOD 3: Create new file
              echo "Creating new file with injected key..."
              grep -v "GROQ_API_KEY" index4.html.bak > index4.html
              echo 'const GROQ_API_KEY = ["'"$GROQ_API_KEY"'"];' >> index4.html
              echo "✅ Created new file with key"
            fi
          fi
          
          # Cleanup
          rm -f index4.html.bak
          
          # Final verification
          echo "=== VERIFICATION ==="
          if grep -q "$GROQ_API_KEY" index4.html; then
            echo "🎉 SUCCESS: Key found in file!"
            echo "First 10 chars: ${GROQ_API_KEY:0:10}"
          else
            echo "⚠️  Key not found, but continuing deployment..."
          fi
      
      # Step 3: Create index.html
      - name: Create index.html
        run: |
          cp index4.html index.html
          echo "Created index.html"
      
      # Step 4: Setup and deploy
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./
      
      - name: Deploy
        uses: actions/deploy-pages@v4
