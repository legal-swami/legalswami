name: Deploy Static HTML with API Key

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      # Step 1: Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # Step 2: Debug
      - name: Debug current HTML
        run: |
          echo "Checking index4.html..."
          ls -la *.html
      
      # Step 3: Inject API Key - FIXED MULTI-LINE SYNTAX
      - name: Inject Groq API Key
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "Starting injection..."
          
          # Simple one-line replacement first
          sed -i 's/__GROQ_API_KEY_PLACEHOLDER__/'"$GROQ_API_KEY"'/g' index4.html
          
          # Verify
          if grep -q "gsk_" index4.html; then
            echo "✅ gsk_ found - injection successful"
            echo "Key length: ${#GROQ_API_KEY} chars"
          else
            echo "❌ gsk_ not found - trying array format..."
            # For array format
            sed -i 's/\["__GROQ_API_KEY_PLACEHOLDER__"\]/["'"$GROQ_API_KEY"'"]/g' index4.html
          fi
      
      # Step 4: Create index.html
      - name: Create index.html
        run: cp index4.html index.html
      
      # Step 5: Setup Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      # Step 6: Upload
      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./
      
      # Step 7: Deploy
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
