name: Secure Deploy
on: [push]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Create deploy copy
        run: cp index4.html index-deploy.html
      
      - name: Inject Key
        run: sed -i "s|__GROQ_API_KEY_PLACEHOLDER__|${{ secrets.GROQ_API_KEY }}|g" index-deploy.html
      
      - name: Rename for GitHub Pages (optional)
        run: mv index-deploy.html index.html
      
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
